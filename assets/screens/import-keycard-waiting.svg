<svg xmlns="http://www.w3.org/2000/svg" width="480" height="700" viewBox="0 0 480 700">
  <rect width="480" height="700" fill="#171717"/>

  <!-- Title -->
  <text x="240" y="60" text-anchor="middle" font-family="Inter, sans-serif" font-size="30" font-weight="700" fill="#FFFFFF">Import</text>

  <!-- Tab bar -->
  <g transform="translate(30, 85)">
    <rect x="0" y="0" width="140" height="36" rx="8" fill="transparent"/>
    <text x="70" y="23" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#A4A4A4">Recovery Phrase</text>

    <rect x="140" y="0" width="140" height="36" rx="8" fill="#262626" stroke="#434343" stroke-width="1"/>
    <text x="210" y="23" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">Keycard</text>

    <rect x="280" y="0" width="140" height="36" rx="8" fill="transparent"/>
    <text x="350" y="23" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#717784">Logos Wallet</text>
  </g>

  <!-- Insert Keycard button (waiting) -->
  <rect x="30" y="150" width="420" height="44" rx="16" fill="#262626" stroke="#434343" stroke-width="1"/>
  <text x="240" y="177" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#FFFFFF">Insert Keycard...</text>

  <!-- Status text -->
  <text x="240" y="215" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#717784">Insert your Keycard</text>
</svg>
